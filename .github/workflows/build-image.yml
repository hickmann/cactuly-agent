name: Build agent-runtime image

on:
  push:
    branches: [main]
    paths:
      - "apps/agent-runtime/**"
      - ".github/workflows/build-image.yml"
      - "docker-compose.yml"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/agent-runtime/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/hickmann/codeshield-sast/agent-runtime:latest
            ghcr.io/hickmann/codeshield-sast/agent-runtime:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
