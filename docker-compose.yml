# CodeShield SAST agent: docker-compose self-hospedável.
#
# Requisitos: Docker Engine 24+ com Compose plugin.
#
# Setup: veja README.md. Resumo:
#   1. Gere um enrollment token em https://usecodeshield.com/admin > Agents
#   2. Preencha .env (baseado em .env.example) com WORKER_ENROLLMENT_TOKEN
#   3. docker compose up -d
#   4. Verifique o status em /admin > Agents (última coluna "Último ping")
#
# O agent-runtime faz polling outbound (5s por default) ao CodeShield SaaS.
# Nenhuma porta é aberta pro mundo: comunicação é sempre iniciada pelo agent.

name: codeshield-sast

services:
  postgres:
    image: postgres:16-alpine
    container_name: codeshield-sast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codeshield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD é obrigatório no .env}
      POSTGRES_DB: codeshield
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeshield -d codeshield"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  agent-runtime:
    image: ghcr.io/hickmann/codeshield-sast/agent-runtime:${AGENT_RUNTIME_TAG:-latest}
    build:
      context: .
      dockerfile: apps/agent-runtime/Dockerfile
    container_name: codeshield-sast-runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Nomes novos (spec). Os antigos (CACTULY_API_URL/CACTULY_ENDPOINT/
      # CACTULY_ENROLLMENT_TOKEN) seguem aceitos como fallback com aviso de
      # deprecação no log.
      CODESHIELD_API_URL: ${CODESHIELD_API_URL:-${CACTULY_API_URL:-${CACTULY_ENDPOINT:-https://usecodeshield.com}}}
      WORKER_ENROLLMENT_TOKEN: ${WORKER_ENROLLMENT_TOKEN:-${CACTULY_ENROLLMENT_TOKEN:-}}
      WORKER_DATA_DIRECTORY: /data
      CODESHIELD_POLL_MS: ${CODESHIELD_POLL_MS:-${CACTULY_POLL_MS:-5000}}
      CODESHIELD_HEARTBEAT_MS: ${CODESHIELD_HEARTBEAT_MS:-${CACTULY_HEARTBEAT_MS:-30000}}
      DATABASE_URL: postgresql://codeshield:${POSTGRES_PASSWORD}@postgres:5432/codeshield
      # API local de jobs (modos de fila local/custom). Sem token, fica desligada.
      CODESHIELD_LOCAL_API_TOKEN: ${CODESHIELD_LOCAL_API_TOKEN:-${CACTULY_LOCAL_API_TOKEN:-}}
      CODESHIELD_LOCAL_API_PORT: ${CODESHIELD_LOCAL_API_PORT:-${CACTULY_LOCAL_API_PORT:-8484}}
    ports:
      # API local de jobs, exposta só no loopback do host. Ajuste se quiser
      # servir pra outras máquinas da rede interna do cliente.
      - "127.0.0.1:${CODESHIELD_LOCAL_API_PORT:-${CACTULY_LOCAL_API_PORT:-8484}}:${CODESHIELD_LOCAL_API_PORT:-${CACTULY_LOCAL_API_PORT:-8484}}"
    volumes:
      - agent-state:/data

  # O agent-runtime executa o motor de fix embutido (sessão headless via
  # Agent SDK) com credenciais efêmeras da central. A fila pode ser a central
  # (modo cactuly), o Postgres deste compose (modo local) ou um Postgres do
  # cliente (modo custom); quem define o modo é o super admin no painel.

volumes:
  postgres-data:
  agent-state:
